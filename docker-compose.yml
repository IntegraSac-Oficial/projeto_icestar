version: '3.8'

services:
  # MySQL Database for iStar project
  istar_db:
    image: mysql:8.0
    container_name: istar_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: istar
      MYSQL_USER: istar_user
      MYSQL_PASSWORD: istar_password
    ports:
      - "3307:3306"  # Porta 3307 no host para evitar conflito com suas outras instâncias
    volumes:
      - istar_db_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - istar_network
    command: --default-authentication-plugin=mysql_native_password --max-connections=200

  # phpMyAdmin for iStar project
  istar_phpmyadmin:
    image: phpmyadmin:latest
    container_name: istar_phpmyadmin
    restart: always
    environment:
      PMA_HOST: istar_db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 100M
    ports:
      - "8090:80"  # Porta 8090 no host para acessar o phpMyAdmin
    depends_on:
      - istar_db
    networks:
      - istar_network

volumes:
  istar_db_data:
    driver: local

networks:
  istar_network:
    driver: bridge
